name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  CARGO_LEPTOS_VERSION: "0.3.6"
  DATABASE_URL: "sqlite:./data/app.db"

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.95
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Cache sqlx-cli binary
        id: cache-sqlx
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/sqlx
          key: bin-sqlx-${{ runner.os }}-v0.8

      - name: Install sqlx-cli
        # cache-hit を信用すると binary が消えてた時に install を skip してしまうので
        # ファイル実在を直接確認する。
        run: |
          if [ ! -x "$HOME/.cargo/bin/sqlx" ]; then
            cargo install sqlx-cli --version "^0.8" --no-default-features --features rustls,sqlite --locked
          fi

      - name: Cache cargo-leptos binary
        id: cache-leptos
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-leptos
          key: bin-leptos-${{ runner.os }}-v${{ env.CARGO_LEPTOS_VERSION }}

      - name: Install cargo-leptos
        # cache-hit を信用すると binary が消えてた時に install を skip してしまうので
        # ファイル実在を直接確認する。
        run: |
          if [ ! -x "$HOME/.cargo/bin/cargo-leptos" ]; then
            curl -fsSL "https://github.com/leptos-rs/cargo-leptos/releases/download/v${CARGO_LEPTOS_VERSION}/cargo-leptos-installer.sh" | bash
          fi

      - name: Prepare SQLite database
        run: |
          mkdir -p data
          sqlx database create
          sqlx migrate run

      - name: Check SQLx offline metadata
        run: cargo sqlx prepare --check -- --features ssr

      - name: Run tests
        env:
          SQLX_OFFLINE: "true"
        run: cargo test --features ssr

      - name: Build with cargo-leptos
        env:
          SQLX_OFFLINE: "true"
        run: cargo leptos build

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: tests/visual/package-lock.json

      - name: Install Playwright deps
        working-directory: tests/visual
        run: npm ci

      - name: Cache Playwright browsers
        id: cache-playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('tests/visual/package-lock.json') }}

      - name: Install Playwright browser
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        working-directory: tests/visual
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps when cache hit
        if: steps.cache-playwright.outputs.cache-hit == 'true'
        working-directory: tests/visual
        run: npx playwright install-deps chromium

      - name: Run visual regression tests
        working-directory: tests/visual
        env:
          SQLX_OFFLINE: "true"
        run: npx playwright test
